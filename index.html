<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
/>
<meta name="theme-color" content="#15151c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="HueSlide" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>Hue Slide Demo</title>

<style>
  html,
  body {
    height: 100%;
    margin: 0;
  }
  body {
    background: #000;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* ---- full-screen color cards (front slides away to reveal back) ---- */
  .card {
    position: fixed;
    inset: 0;
    will-change: clip-path;
  }
  #cardBack {
    z-index: 1;
  }
  #cardFront {
    z-index: 2;
  }
  #fx {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    display: none;
  }

  /* ---- Hue indicator (top-right corner) ---- */
  .hud {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    right: calc(env(safe-area-inset-right, 0px) + 12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 9px 9px 7px;
    border-radius: 16px;
    background: rgba(0, 0, 0, 0.26);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    pointer-events: none;
    transition: opacity 0.35s ease;
    z-index: 10;
  }
  .hud.hidden {
    opacity: 0;
  }

  .wheel-wrap {
    position: relative;
    width: 68px;
    height: 68px;
  }

  .wheel {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    /* carve the disc into a ring */
    -webkit-mask: radial-gradient(closest-side, transparent 65%, #000 67%);
    mask: radial-gradient(closest-side, transparent 65%, #000 67%);
  }

  .cursor {
    position: absolute;
    width: 14px;
    height: 14px;
    left: 34px;
    top: 34px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid rgba(0, 0, 0, 0.55);
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.55);
    transform: translate(-50%, -50%);
    will-change: left, top;
  }

  .val {
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.4px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
    font-variant-numeric: tabular-nums;
  }

  .gauges {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .gcol {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .sat-meter {
    position: relative;
    width: 12px;
    height: 68px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    background: #888; /* replaced by JS with a saturation gradient */
  }
  .sat-marker {
    position: absolute;
    left: -3px;
    right: -3px;
    height: 3px;
    bottom: 0;
    transform: translateY(50%);
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.55);
    border-radius: 2px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
    will-change: bottom;
  }

  /* ---- swipe hint ---- */
  .hint {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.26);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.6s ease;
    z-index: 10;
  }
  .hint.hide {
    opacity: 0;
  }
</style>

<div class="card" id="cardBack"></div>
<div class="card" id="cardFront"></div>
<canvas id="fx"></canvas>

<div class="hud hidden" aria-hidden="true">
  <div class="gauges">
    <div class="gcol">
      <div class="wheel-wrap">
        <div class="wheel" id="wheel"></div>
        <div class="cursor" id="cursor"></div>
      </div>
      <div class="val" id="hueVal">0&deg;</div>
    </div>
    <div class="gcol">
      <div class="sat-meter" id="satMeter">
        <div class="sat-marker" id="satMarker"></div>
      </div>
      <div class="val" id="satVal">80%</div>
    </div>
  </div>
</div>

<div class="hint" id="hint">&larr; &uarr; &nbsp;swipe&nbsp; &darr; &rarr;</div>

<script>
  "use strict";

  // ---- configuration ----
  var SAT = 0.8; // 彩度 80% (initial / reference)
  var VAL = 0.8; // 明度 80% (HSV)
  var SAT_MIN = 0.15,
    SAT_MAX = 1.0,
    STEP_S = 0.18; // vertical swipe steps the saturation
  var curSat = SAT; // live saturation (changed by up/down swipes)
  // Golden angle: stepping the hue by this each swipe spreads colors as evenly
  // as possible around the wheel (phyllotaxis), so consecutive colors are always
  // clearly different and no near-duplicates pile up. +/- the same angle makes
  // left/right swipes exact inverses of each other.
  var GOLDEN = 360 * (2 - (1 + Math.sqrt(5)) / 2); // ≈ 137.50776°
  var SWIPE_THRESHOLD = 40; // px
  var SLIDE_MS = 560; // wipe / slide duration
  var DISSOLVE_MS = 520; // saturation grain-dissolve duration
  var CURSOR_R = 28; // cursor radius on the ring (px)

  // ---- HSV -> RGB ----
  function hsvToRgb(h, s, v) {
    h = ((h % 360) + 360) % 360;
    var c = v * s;
    var x = c * (1 - Math.abs(((h / 60) % 2) - 1));
    var m = v - c;
    var r = 0,
      g = 0,
      b = 0;
    if (h < 60) {
      r = c;
      g = x;
    } else if (h < 120) {
      r = x;
      g = c;
    } else if (h < 180) {
      g = c;
      b = x;
    } else if (h < 240) {
      g = x;
      b = c;
    } else if (h < 300) {
      r = x;
      b = c;
    } else {
      r = c;
      b = x;
    }
    return [
      Math.round((r + m) * 255),
      Math.round((g + m) * 255),
      Math.round((b + m) * 255),
    ];
  }
  function rgbStr(h, s) {
    var c = hsvToRgb(h, s === undefined ? curSat : s, VAL);
    return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
  }
  function norm(h) {
    return ((h % 360) + 360) % 360;
  }

  // ---- elements ----
  var cardFront = document.getElementById("cardFront");
  var cardBack = document.getElementById("cardBack");
  var fx = document.getElementById("fx");
  var fxc = fx.getContext("2d");
  var wheel = document.getElementById("wheel");
  var cursor = document.getElementById("cursor");
  var hueVal = document.getElementById("hueVal");
  var satMeter = document.getElementById("satMeter");
  var satMarker = document.getElementById("satMarker");
  var satVal = document.getElementById("satVal");
  var hint = document.getElementById("hint");
  var hud = document.querySelector(".hud");

  // build the color ring so it matches the background palette (HSV S80/V80)
  (function buildWheel() {
    var stops = [];
    for (var a = 0; a <= 360; a += 15) {
      stops.push(rgbStr(a, 0.8) + " " + a + "deg"); // reference ring at S80
    }
    wheel.style.background = "conic-gradient(from 0deg, " + stops.join(", ") + ")";
  })();

  // ---- indicator (corner) : cursor + number, no background ----
  function applyIndicator(h) {
    var n = norm(h);
    var rad = (n * Math.PI) / 180; // 0deg = top of the ring, clockwise
    cursor.style.left = 34 + CURSOR_R * Math.sin(rad) + "px";
    cursor.style.top = 34 - CURSOR_R * Math.cos(rad) + "px";
    hueVal.textContent = (Math.round(n) % 360) + "°";
    // saturation meter shows the S spectrum (muted -> vivid) at the current hue
    satMeter.style.background =
      "linear-gradient(to top, " + rgbStr(n, SAT_MIN) + ", " + rgbStr(n, 1) + ")";
  }

  // position the saturation marker + number for a given S
  function applySat(s) {
    var frac = (s - SAT_MIN) / (SAT_MAX - SAT_MIN);
    frac = frac < 0 ? 0 : frac > 1 ? 1 : frac;
    satMarker.style.bottom = frac * 100 + "%";
    satVal.textContent = Math.round(s * 100) + "%";
  }

  // ---- state ----
  // hue(step) = hue0 + step * GOLDEN. Tracking an integer step keeps left/right
  // swipes exact inverses with zero floating-point drift.
  var hue0 = Math.random() * 360; // ランダムな初期色
  var step = 0;
  var animating = false;

  function hueForStep(s) {
    return norm(hue0 + s * GOLDEN);
  }

  // initial paint
  cardFront.style.backgroundColor = rgbStr(hueForStep(step));
  cardBack.style.backgroundColor = rgbStr(hueForStep(step));
  applyIndicator(hueForStep(step));
  applySat(curSat);

  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  // shortest signed angular distance old -> new, in (-180, 180]
  function shortestArc(a, b) {
    var d = norm(b - a);
    return d > 180 ? d - 360 : d;
  }

  // ---- Web Audio: sound reaction derived from HSB ----
  // Hue -> pitch (major pentatonic, so every jump stays consonant and the
  // golden angle spreads notes evenly across the scale just like the colors).
  // S -> timbre brightness (low-pass cutoff), V -> loudness. On a swipe the
  // pitch glides old -> new in sync with the card slide, so a back-swipe is
  // the exact reverse glissando.
  var audioCtx = null,
    master = null;
  function ensureAudio() {
    if (audioCtx) {
      if (audioCtx.state === "suspended") audioCtx.resume();
      return;
    }
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    master = audioCtx.createGain();
    master.gain.value = 0.8;
    master.connect(audioCtx.destination);
  }

  // major pentatonic (semitones from the root) across 3 octaves
  var PENTA = [];
  (function () {
    var base = [0, 2, 4, 7, 9];
    for (var o = 0; o < 3; o++) {
      for (var i = 0; i < base.length; i++) PENTA.push(base[i] + 12 * o);
    }
  })();
  var ROOT_HZ = 220; // A3

  function freqForHue(h) {
    var idx = Math.round((norm(h) / 360) * (PENTA.length - 1));
    return ROOT_HZ * Math.pow(2, PENTA[idx] / 12);
  }

  // a soft plucked note gliding oldHue -> newHue over durMs
  function playSlide(oldHue, newHue, durMs) {
    ensureAudio();
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    var dur = durMs / 1000;
    // saturation also sets the octave: vivid = higher, muted = lower (~±1 oct)
    var oct = Math.pow(2, (curSat - 0.575) * 2.35);
    var f0 = freqForHue(oldHue) * oct,
      f1 = freqForHue(newHue) * oct;

    var osc = audioCtx.createOscillator();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(f0, t);
    osc.frequency.exponentialRampToValueAtTime(f1, t + dur);

    // a quieter voice a fifth above for body
    var osc2 = audioCtx.createOscillator();
    osc2.type = "sine";
    osc2.frequency.setValueAtTime(f0 * 1.5, t);
    osc2.frequency.exponentialRampToValueAtTime(f1 * 1.5, t + dur);
    var mix2 = audioCtx.createGain();
    mix2.gain.value = 0.35;

    var filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 500 + curSat * 4500; // S -> brightness
    filter.Q.value = 0.7;

    var env = audioCtx.createGain();
    var peak = 0.06 + VAL * 0.26; // V -> loudness
    var end = t + Math.max(dur, 0.25) + 0.7;
    env.gain.setValueAtTime(0.0001, t);
    env.gain.exponentialRampToValueAtTime(peak, t + 0.015); // pluck attack
    env.gain.exponentialRampToValueAtTime(0.0001, end); // decay tail

    osc.connect(filter);
    osc2.connect(mix2);
    mix2.connect(filter);
    filter.connect(env);
    env.connect(master);

    osc.start(t);
    osc2.start(t);
    osc.stop(end + 0.05);
    osc2.stop(end + 0.05);
  }

  // Build a clip-path whose boundary is a smooth, organic wavy curve (a sum of
  // two sines with a drifting phase) rather than a straight line. `fwd` picks
  // which side keeps the old color; `seam` is the boundary's base position
  // (0..100 % of width); `amp` the wave amplitude (% of width); `ph` the phase.
  // A randomized "wave profile" (2-3 sine components) so every transition's
  // seam has a fresh, organic shape.
  function randWave() {
    var n = Math.random() < 0.5 ? 2 : 3,
      comps = [],
      sum = 0,
      i,
      wgt;
    for (i = 0; i < n; i++) {
      wgt = 0.3 + Math.random();
      comps.push({
        freq: 1 + Math.random() * 3.5, // 1.0 .. 4.5 waves over the height
        weight: wgt,
        phase: Math.random() * Math.PI * 2,
        drift: (Math.random() * 2 - 1) * 1.3, // undulation speed + direction
      });
      sum += wgt;
    }
    for (i = 0; i < comps.length; i++) comps[i].weight /= sum; // steady amplitude
    return comps;
  }

  // Clip-path whose boundary is a smooth organic curve built from `comps`.
  // `fwd` picks which side keeps the old color; `seam` is the base position
  // (0..100 % of width); `amp` the amplitude (% of width); `tsec` elapsed sec.
  function seamClip(fwd, seam, amp, tsec, comps, peakY) {
    var N = 26,
      pts = [],
      i,
      c,
      x,
      yf,
      w,
      crest;
    var crestDir = fwd ? 1 : -1; // the peak bulges toward the incoming color
    pts.push(fwd ? "0% 0%" : "100% 0%"); // old kept LEFT (fwd) / RIGHT (back)
    for (i = 0; i <= N; i++) {
      yf = i / N;
      // Gaussian centered on the swipe height -> the wave is tallest there
      crest = Math.exp(-0.5 * Math.pow((yf - peakY) / 0.15, 2));
      w = crestDir * crest * 1.4; // dominant crest at the swiped height
      for (c = 0; c < comps.length; c++) {
        w +=
          comps[c].weight *
          Math.sin(
            2 * Math.PI * comps[c].freq * yf + comps[c].phase + comps[c].drift * tsec
          ) *
          (0.22 + 0.55 * crest); // organic ripple, larger near the swipe
      }
      x = seam + amp * w;
      x = x < 0 ? 0 : x > 100 ? 100 : x;
      pts.push(x.toFixed(2) + "% " + (yf * 100).toFixed(2) + "%");
    }
    pts.push(fwd ? "0% 100%" : "100% 100%");
    return "polygon(" + pts.join(", ") + ")";
  }

  // dir = +1 : swipe left  -> advance a step, new color wipes in from the RIGHT
  // dir = -1 : swipe right -> go back a step, new color wipes in from the LEFT
  function slide(dir, swipeYf) {
    if (animating) return;
    if (swipeYf === undefined) swipeYf = 0.5; // keyboard / fallback: centre
    animating = true;

    var fwd = dir > 0;
    var oldHue = hueForStep(step);
    step += dir;
    var newHue = hueForStep(step);

    playSlide(oldHue, newHue, SLIDE_MS); // HSB-derived sound, glides old -> new

    // back card = destination color; front (on top) = source color, wiped away
    cardBack.style.backgroundColor = rgbStr(newHue);
    cardFront.style.backgroundColor = rgbStr(oldHue);

    var arc = shortestArc(oldHue, newHue); // move the cursor the short way
    var wave = randWave(); // fresh random seam shape each swipe
    var ampBase = 5 + Math.random() * 4; // 5..9 % of width
    var t0 = performance.now();

    function frame(now) {
      var t = Math.min(1, (now - t0) / SLIDE_MS);
      if (t < 1) {
        var e = easeInOutCubic(t);
        var seam = fwd ? 100 * (1 - e) : 100 * e; // sweep the old color off
        var taper = Math.sin(Math.PI * e); // wave grows then relaxes
        var recoil = 6.5 * Math.exp(-Math.pow((e - 0.82) / 0.11, 2)); // elastic settle
        var amp = ampBase * taper + 2 + recoil;
        var tsec = (now - t0) / 1000; // drives the phase drift
        var cp = seamClip(fwd, seam, amp, tsec, wave, swipeYf);
        cardFront.style.clipPath = cp;
        cardFront.style.webkitClipPath = cp;
        applyIndicator(oldHue + arc * e);
        requestAnimationFrame(frame);
      } else {
        // commit: front now holds the new color, unclipped, ready for next
        cardFront.style.clipPath = "none";
        cardFront.style.webkitClipPath = "none";
        cardFront.style.backgroundColor = rgbStr(newHue);
        applyIndicator(newHue);
        animating = false;
      }
    }
    requestAnimationFrame(frame);
  }

  // Vertical swipe changes Saturation with a grainy block "dissolve" — a
  // deliberately different visual language from the horizontal wavy wipe.
  // dir = +1 (swipe up): more vivid ; dir = -1 (swipe down): more muted.
  function shiftSat(dir) {
    if (animating) return;
    var oldS = curSat;
    var newS = Math.max(SAT_MIN, Math.min(SAT_MAX, curSat + dir * STEP_S));
    if (Math.abs(newS - oldS) < 0.001) return; // already at the limit
    animating = true;
    curSat = newS;

    var hue = hueForStep(step);
    var oldColor = rgbStr(hue, oldS);
    var newColor = rgbStr(hue, newS);

    // the NEW color sits beneath the dissolve canvas
    cardFront.style.backgroundColor = newColor;
    cardBack.style.backgroundColor = newColor;

    playSlide(hue, hue, DISSOLVE_MS); // same pitch, timbre follows the new S

    var dpr = window.devicePixelRatio || 1;
    var W = window.innerWidth,
      H = window.innerHeight;
    fx.width = W * dpr;
    fx.height = H * dpr;
    fxc.setTransform(dpr, 0, 0, dpr, 0, 0);
    var CELL = 13; // grain size (finer)
    var cols = Math.ceil(W / CELL),
      rows = Math.ceil(H / CELL),
      total = cols * rows;

    // grainy reveal order, gently biased along the swipe direction
    var order = [];
    for (var r = 0; r < rows; r++) {
      for (var cc = 0; cc < cols; cc++) {
        var yf = rows > 1 ? r / (rows - 1) : 0;
        var bias = dir > 0 ? 1 - yf : yf; // up -> from bottom, down -> from top
        order.push({ i: r * cols + cc, k: bias * 0.6 + Math.random() * 0.4 });
      }
    }
    order.sort(function (a, b) {
      return a.k - b.k;
    });

    fx.style.display = "block";
    fxc.fillStyle = oldColor; // whole screen starts as the OLD color
    fxc.fillRect(0, 0, W, H);

    var revealed = 0;
    var t0 = performance.now();
    function frame(now) {
      var t = Math.min(1, (now - t0) / DISSOLVE_MS);
      var target = Math.floor(t * total);
      for (; revealed < target; revealed++) {
        var idx = order[revealed].i;
        fxc.clearRect((idx % cols) * CELL, Math.floor(idx / cols) * CELL, CELL + 1, CELL + 1);
      }
      applySat(oldS + (newS - oldS) * t); // animate the meter with the dissolve
      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        fx.style.display = "none";
        fxc.clearRect(0, 0, W, H);
        applySat(newS);
        animating = false;
      }
    }
    requestAnimationFrame(frame);
  }

  // ---- swipe detection (pointer events cover touch + mouse) ----
  var startX = 0,
    startY = 0,
    tracking = false,
    lastTap = 0;

  window.addEventListener(
    "pointerdown",
    function (e) {
      startX = e.clientX;
      startY = e.clientY;
      tracking = true;
    },
    { passive: true }
  );

  window.addEventListener(
    "pointerup",
    function (e) {
      if (!tracking) return;
      tracking = false;
      var dx = e.clientX - startX;
      var dy = e.clientY - startY;
      if (Math.abs(dx) >= SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
        hideHint();
        // wave peaks at the height the finger swiped
        var yf = (startY + e.clientY) / 2 / window.innerHeight;
        yf = yf < 0 ? 0 : yf > 1 ? 1 : yf;
        slide(dx < 0 ? 1 : -1, yf); // swipe left => advance, right => back
        return;
      }
      if (Math.abs(dy) >= SWIPE_THRESHOLD && Math.abs(dy) > Math.abs(dx)) {
        hideHint();
        shiftSat(dy < 0 ? 1 : -1); // swipe up => vivid, swipe down => muted
        return;
      }
      // otherwise a tap: double-tap toggles the hue indicator
      if (Math.abs(dx) < 12 && Math.abs(dy) < 12) {
        var tnow = e.timeStamp || performance.now();
        if (tnow - lastTap < 300) {
          hud.classList.toggle("hidden");
          lastTap = 0;
        } else {
          lastTap = tnow;
        }
      }
    },
    { passive: true }
  );

  window.addEventListener("pointercancel", function () {
    tracking = false;
  });

  // keyboard support (desktop testing)
  window.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight") {
      hideHint();
      slide(1);
    } else if (e.key === "ArrowLeft") {
      hideHint();
      slide(-1);
    } else if (e.key === "ArrowUp") {
      hideHint();
      shiftSat(1);
    } else if (e.key === "ArrowDown") {
      hideHint();
      shiftSat(-1);
    }
  });

  // ---- swipe hint auto-hide ----
  var hintTimer = setTimeout(hideHint, 3400);
  function hideHint() {
    clearTimeout(hintTimer);
    hint.classList.add("hide");
  }

  // ---- PWA service worker ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
